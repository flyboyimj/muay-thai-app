<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — CoachMe Muay Thai</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      color: #fadcaf;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 32px;
      text-align: center;
    }
    .icon { font-size: 64px; }
    h1 { font-size: 24px; color: #d65a28; }
    p { font-size: 15px; color: #b0b0c0; line-height: 1.6; max-width: 300px; }
    button {
      margin-top: 8px;
      background: #d65a28;
      color: #0d0d1a;
      border: none;
      border-radius: 24px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">🥊</div>
  <h1>You're Offline</h1>
  <p>No internet connection right now. Your training programs and combos are cached and available — just reload once you're back online.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
